services:
  - type: web
    name: ai-token-proxy
    env: python
    runtime: python3.12
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_QUOTA
        value: "0.5"
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
