services:
  - type: web
    name: ai-token-proxy
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DEFAULT_QUOTA
        value: "0.5"
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
