<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>鎺у埗鍙?鈥?AI Token Proxy</title>
<style>
:root{--bg:#0b0d14;--surface:#131620;--border:#1e2233;--text:#dde1ed;--dim:#747b91;--accent:#5c7cfa;--green:#38d9a9;--red:#ff6b6b;--radius:8px;--font:system-ui,-apple-system,sans-serif;--t:all .18s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:10}
.logo{font-weight:700;font-size:14px;color:var(--accent);text-decoration:none}
nav{display:flex;align-items:center;gap:12px;font-size:12px}
nav a{color:var(--dim);text-decoration:none;cursor:pointer;transition:color .15s;padding:4px 8px;border-radius:4px}
nav a:hover{color:var(--text)}
.user-bar{display:flex;align-items:center;gap:10px;color:var(--dim)}
.user-bar .name{color:var(--text)}
.btn-logout{background:none;border:1px solid var(--border);color:var(--red);padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px;transition:var(--t)}
.btn-logout:hover{background:rgba(255,107,107,.08)}
main{max-width:960px;margin:0 auto;padding:24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;transition:var(--t)}
.stat:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.stat .num{font-size:26px;font-weight:700;color:var(--accent);transition:var(--t)}
.stat .label{font-size:11px;color:var(--dim);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;transition:var(--t)}
.card:hover{border-color:rgba(92,124,250,.2)}
.card h2{font-size:15px;font-weight:600;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;color:var(--dim);font-weight:500;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.4px}
td{padding:8px 10px;border-bottom:1px solid rgba(30,34,51,.5);transition:background .12s}
tr:hover td{background:rgba(255,255,255,.015)}
.mono{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:var(--accent)}
code{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--green);transition:var(--t)}
code:hover{background:#1f2937}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge-ok{background:rgba(56,217,169,.12);color:var(--green);border:1px solid rgba(56,217,169,.2)}
.badge-err{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.2)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font);transition:var(--t);border:1px solid var(--border);background:transparent;color:var(--text)}
.btn:hover{transform:translateY(-1px);border-color:var(--accent)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{opacity:.9;box-shadow:0 2px 8px rgba(92,124,250,.3)}
.btn-d{color:var(--red);border-color:rgba(255,107,107,.2)}.btn-d:hover{background:rgba(255,107,107,.08)}
.empty{text-align:center;padding:32px;color:var(--dim);font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;z-index:100;animation:fadeUp .3s ease}
.toast.err{background:var(--red)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;align-items:center;justify-content:center}
.modal.show{display:flex;animation:fadeUp .15s ease}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:360px;animation:fadeUp .2s ease}
.modal-box h3{font-size:14px;margin-bottom:12px}
.modal-box input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;margin:6px 0;font-family:var(--font);transition:var(--t)}
.modal-box input:focus{border-color:var(--accent)}
.actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loading{animation:pulse 1.5s infinite}
</style>
</head>
<body>
<header>
<a href="/" class="logo">鈿?AI Token Proxy</a>
<nav>
<a href="/pricing">妯″瀷瀹氫环</a>
<a style="cursor:pointer" onclick="showPwModal()">淇敼瀵嗙爜</a>
<span class="user-bar"><span class="name" id="userName">...</span><button class="btn-logout" onclick="logout()">閫€鍑?/button></span>
</nav>
</header>
<main>
<div class="stats">
<div class="stat"><div class="num" id="statQuota">-</div><div class="label">鍓╀綑棰濆害 ($)</div></div>
<div class="stat"><div class="num" id="statRequests">-</div><div class="label">璇锋眰娆℃暟</div></div>
<div class="stat"><div class="num" id="statTokens">-</div><div class="label">娑堣€?Token</div></div>
<div class="stat"><div class="num" id="statCost">-</div><div class="label">璐圭敤 ($)</div></div>
</div>

<div class="card">
<h2>鎴戠殑 API 浠ょ墝</h2>
<div style="margin-bottom:12px"><button class="btn btn-p" onclick="createToken()">+ 鏂板缓浠ょ墝</button></div>
<div id="tokensTable"><div class="empty"><span class="spinner"></span> 鍔犺浇涓?..</div></div>
</div>

<div class="card">
<h2>鏈€杩戜娇鐢ㄨ褰?/h2>
<div id="logsTable"><div class="empty"><span class="spinner"></span> 鍔犺浇涓?..</div></div>
</div>
</main>

<div class="modal" id="pwModal"><div class="modal-box">
<h3>淇敼瀵嗙爜</h3>
<input type="password" id="oldPw" placeholder="褰撳墠瀵嗙爜">
<input type="password" id="newPw" placeholder="鏂板瘑鐮侊紙鑷冲皯4浣嶏級">
<div class="actions"><button class="btn" onclick="closePw()">鍙栨秷</button><button class="btn btn-p" onclick="changePassword()">淇濆瓨</button></div>
</div></div>

<script>
var JWT=localStorage.getItem('aiaiai_jwt'),USER=JSON.parse(localStorage.getItem('aiaiai_user')||'{}');
if(!JWT)window.location.href='/login';
document.getElementById('userName').textContent=USER.name||USER.email;
var H={'Authorization':'Bearer '+JWT,'Content-Type':'application/json'};

function toast(m,e){var el=document.createElement('div');el.className='toast'+(e?' err':'');el.textContent=m;document.body.appendChild(el);setTimeout(function(){el.remove()},2400)}
function logout(){localStorage.clear();window.location.href='/login'}
function cp(t){navigator.clipboard.writeText(t).then(function(){toast('宸插鍒跺埌鍓创鏉?)})}
function showPwModal(){document.getElementById('pwModal').classList.add('show')}
function closePw(){document.getElementById('pwModal').classList.remove('show');document.getElementById('oldPw').value='';document.getElementById('newPw').value=''}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

async function load(){
try{
var r=await fetch('/api/auth/me',{headers:H});if(!r.ok){logout();return}
var me=await r.json(),u=me.user;
document.getElementById('statQuota').textContent=u.quota<0?'鏃犻檺':Math.max(0,u.quota-u.used_quota).toFixed(3);
var tokens=me.tokens||[];
if(!tokens.length){document.getElementById('tokensTable').innerHTML='<div class="empty">杩樻病鏈変护鐗岋紝鐐瑰嚮涓婃柟鎸夐挳鍒涘缓</div>'}
else{
var h='<table><tr><th>鍚嶇О</th><th>浠ょ墝</th><th>鐘舵€?/th><th>鍒涘缓鏃堕棿</th><th>鎿嶄綔</th></tr>';
tokens.forEach(function(t){h+='<tr><td>'+esc(t.name)+'</td><td><code onclick="cp(\''+t.token_prefix+'...\')">'+t.token_prefix+'...</code></td>';h+='<td>'+(t.enabled?'<span class="badge badge-ok">姝ｅ父</span>':'<span class="badge badge-err">宸叉挙閿€</span>')+'</td>';h+='<td style="font-size:11px;color:var(--dim)">'+t.created_at+'</td>';h+='<td>'+(t.enabled?'<button class="btn btn-d" style="font-size:10px;padding:2px 8px" onclick="delTk('+t.id+')">鎾ら攢</button>':'')+'</td></tr>'});h+='</table>';document.getElementById('tokensTable').innerHTML=h}
var ur=await fetch('/api/user/usage',{headers:H});if(ur.ok){var uu=await ur.json(),s=uu.stats;
document.getElementById('statRequests').textContent=s.total_requests;document.getElementById('statTokens').textContent=(s.total_tokens||0).toLocaleString();document.getElementById('statCost').textContent=(s.total_cost||0).toFixed(4);
var logs=uu.logs||[];if(!logs.length){document.getElementById('logsTable').innerHTML='<div class="empty">鏆傛棤浣跨敤璁板綍锛屽紑濮嬭皟鐢?API 鍚?/div>'}
else{var lh='<table><tr><th>鏃堕棿</th><th>妯″瀷</th><th>鍘傚晢</th><th>Token鏁?/th><th>璐圭敤</th><th>鐘舵€?/th></tr>';logs.forEach(function(l){lh+='<tr><td style="font-size:11px;color:var(--dim)">'+l.created_at+'</td><td>'+l.model+'</td><td>'+l.provider+'</td><td>'+l.total_tokens.toLocaleString()+'</td><td>$'+l.quota_used.toFixed(5)+'</td><td>'+(l.status==='success'?'<span class="badge badge-ok">鎴愬姛</span>':'<span class="badge badge-err">澶辫触</span>')+'</td></tr>'});lh+='</table>';document.getElementById('logsTable').innerHTML=lh}}}
}catch(e){toast('鍔犺浇澶辫触锛岃鍒锋柊閲嶈瘯',true)}}

async function createToken(){try{var r=await fetch('/api/user/tokens',{method:'POST',headers:H,body:JSON.stringify({name:'鏂板缓浠ょ墝'})});if(!r.ok){toast('鍒涘缓澶辫触',true);return}var d=await r.json();toast('浠ょ墝宸插垱寤? '+d.token.token_prefix+'...');load()}catch(e){toast('鍒涘缓澶辫触',true)}}
async function delTk(tid){if(!confirm('纭畾鎾ら攢姝や护鐗岋紵灏嗙珛鍗冲け鏁堛€?))return;try{await fetch('/api/user/tokens/'+tid,{method:'DELETE',headers:H});toast('浠ょ墝宸叉挙閿€');load()}catch(e){toast('鎾ら攢澶辫触',true)}}
async function changePassword(){var o=document.getElementById('oldPw').value,n=document.getElementById('newPw').value;if(n.length<4){toast('鏂板瘑鐮佽嚦灏?浣?,true);return}try{var r=await fetch('/api/auth/password',{method:'PATCH',headers:H,body:JSON.stringify({old_password:o,new_password:n})});if(!r.ok){var e=await r.json();toast(e.detail||'淇敼澶辫触',true);return}toast('瀵嗙爜宸蹭慨鏀?);closePw()}catch(e){toast('淇敼澶辫触',true)}}
document.getElementById('pwModal').addEventListener('click',function(e){if(e.target===this)closePw()});
load();
</script></body></html>
