<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>控制台 — AI Token Proxy</title>
<style>
:root{--bg:#0b0d14;--surface:#131620;--border:#1e2233;--text:#dde1ed;--dim:#747b91;--accent:#5c7cfa;--green:#38d9a9;--red:#ff6b6b;--radius:8px;--font:system-ui,-apple-system,sans-serif;--t:all .18s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:10}
.logo{font-weight:700;font-size:14px;color:var(--accent);text-decoration:none}
nav{display:flex;align-items:center;gap:12px;font-size:12px}
nav a{color:var(--dim);text-decoration:none;cursor:pointer;transition:color .15s;padding:4px 8px;border-radius:4px}
nav a:hover{color:var(--text)}
.user-bar{display:flex;align-items:center;gap:10px;color:var(--dim)}
.user-bar .name{color:var(--text)}
.btn-logout{background:none;border:1px solid var(--border);color:var(--red);padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px;transition:var(--t)}
.btn-logout:hover{background:rgba(255,107,107,.08)}
main{max-width:960px;margin:0 auto;padding:24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;transition:var(--t)}
.stat:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.stat .num{font-size:26px;font-weight:700;color:var(--accent);transition:var(--t)}
.stat .label{font-size:11px;color:var(--dim);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;transition:var(--t)}
.card:hover{border-color:rgba(92,124,250,.2)}
.card h2{font-size:15px;font-weight:600;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;color:var(--dim);font-weight:500;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.4px}
td{padding:8px 10px;border-bottom:1px solid rgba(30,34,51,.5);transition:background .12s}
tr:hover td{background:rgba(255,255,255,.015)}
.mono{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:var(--accent)}
code{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--green);transition:var(--t)}
code:hover{background:#1f2937}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge-ok{background:rgba(56,217,169,.12);color:var(--green);border:1px solid rgba(56,217,169,.2)}
.badge-err{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.2)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font);transition:var(--t);border:1px solid var(--border);background:transparent;color:var(--text)}
.btn:hover{transform:translateY(-1px);border-color:var(--accent)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{opacity:.9;box-shadow:0 2px 8px rgba(92,124,250,.3)}
.btn-d{color:var(--red);border-color:rgba(255,107,107,.2)}.btn-d:hover{background:rgba(255,107,107,.08)}
.empty{text-align:center;padding:32px;color:var(--dim);font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;z-index:100;animation:fadeUp .3s ease}
.toast.err{background:var(--red)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;align-items:center;justify-content:center}
.modal.show{display:flex;animation:fadeUp .15s ease}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:360px;animation:fadeUp .2s ease}
.modal-box h3{font-size:14px;margin-bottom:12px}
.modal-box input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;margin:6px 0;font-family:var(--font);transition:var(--t)}
.modal-box input:focus{border-color:var(--accent)}
.actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loading{animation:pulse 1.5s infinite}
.mt2{margin-top:12px}
</style>
</head>
<body>
<header>
<a href="/" class="logo">⚡ AI Token Proxy</a>
<nav>
<a href="/pricing">模型定价</a>
<a style="cursor:pointer" onclick="showPwModal()">修改密码</a>
<span class="user-bar"><span class="name" id="userName">...</span><button class="btn-logout" onclick="logout()">退出</button></span>
</nav>
</header>
<main>
<div id="welcomeBanner" style="display:none;background:rgba(92,124,250,.08);border:1px solid rgba(92,124,250,.25);border-radius:8px;padding:14px 18px;margin-bottom:20px;font-size:13px">
<strong>欢迎！</strong> 你的首个 API 令牌已生成，请立即复制保存：
<code id="welcomeToken" style="display:block;margin-top:8px;padding:8px;background:var(--bg);border-radius:4px;font-size:11px;word-break:break-all;color:var(--green);cursor:pointer" onclick="cp(this.textContent)"></code>
</div>
<div class="stats">
<div class="stat"><div class="num" id="statQuota">-</div><div class="label">剩余额度 ($)</div></div>
<div class="stat"><div class="num" id="statRequests">-</div><div class="label">请求次数</div></div>
<div class="stat"><div class="num" id="statTokens">-</div><div class="label">消耗 Token</div></div>
<div class="stat"><div class="num" id="statCost">-</div><div class="label">费用 ($)</div></div>
</div>

<div class="card">
<h2>我的 API 令牌</h2>
<div style="margin-bottom:12px"><button class="btn btn-p" onclick="createToken()">+ 新建令牌</button></div>
<div id="tokensTable"><div class="empty"><span class="spinner"></span> 加载中...</div></div>
</div>

<div id="usageBreakdown" style="display:none">
<div class="card">
<h2>按模型用量统计</h2>
<div id="byModelTable"><div class="empty">暂无数据</div></div>
</div>
</div>

<div class="card">
<h2>最近使用记录</h2>
<div id="logsTable"><div class="empty"><span class="spinner"></span> 加载中...</div></div>
</div>
</main>

<div class="modal" id="tokenModal"><div class="modal-box" style="max-width:480px">
<h3>🎉 令牌已创建</h3>
<p style="font-size:12px;color:var(--dim);margin-bottom:12px">请立即复制保存，关闭后将无法再次查看完整密钥</p>
<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;display:flex;align-items:center;gap:8px;margin-bottom:12px">
<code id="newTokenValue" style="flex:1;font-size:11px;word-break:break-all;color:var(--green)"></code>
<button class="btn btn-p" onclick="cp(document.getElementById('newTokenValue').textContent)">复制</button>
</div>
<button class="btn" style="width:100%" onclick="closeTokenModal()">我已保存，关闭</button>
</div></div>

<div class="modal" id="pwModal"><div class="modal-box">
<h3>修改密码</h3>
<input type="password" id="oldPw" placeholder="当前密码">
<input type="password" id="newPw" placeholder="新密码（至少6位）">
<div class="actions"><button class="btn" onclick="closePw()">取消</button><button class="btn btn-p" onclick="changePassword()">保存</button></div>
</div></div>

<script>
var JWT=localStorage.getItem('aiaiai_jwt'),USER=JSON.parse(localStorage.getItem('aiaiai_user')||'{}');
if(!JWT)window.location.href='/login';
document.getElementById('userName').textContent=USER.name||USER.email;
var H={'Authorization':'Bearer '+JWT,'Content-Type':'application/json'};

function toast(m,e){var el=document.createElement('div');el.className='toast'+(e?' err':'');el.textContent=m;document.body.appendChild(el);setTimeout(function(){el.remove()},2400)}
function logout(){localStorage.clear();window.location.href='/login'}
function cp(t){navigator.clipboard.writeText(t).then(function(){toast('已复制到剪贴板')})}
function closeTokenModal(){document.getElementById('tokenModal').classList.remove('show');load()}
function showTokenModal(token){document.getElementById('newTokenValue').textContent=token;document.getElementById('tokenModal').classList.add('show')}
function showPwModal(){document.getElementById('pwModal').classList.add('show')}
function closePw(){document.getElementById('pwModal').classList.remove('show');document.getElementById('oldPw').value='';document.getElementById('newPw').value=''}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

async function load(){
try{
var r=await fetch('/api/auth/me',{headers:H});if(!r.ok){logout();return}
var me=await r.json(),u=me.user;
document.getElementById('statQuota').textContent=u.quota<0?'无限':Math.max(0,u.quota-u.used_quota).toFixed(3);
var tokens=me.tokens||[];
if(!tokens.length){document.getElementById('tokensTable').innerHTML='<div class="empty">还没有令牌，点击上方按钮创建</div>'}
else{
var h='<table><tr><th>名称</th><th>令牌</th><th>状态</th><th>创建时间</th><th>操作</th></tr>';
tokens.forEach(function(t){h+='<tr><td>'+esc(t.name)+'</td><td><code onclick="cp(\''+t.token_prefix+'...\')">'+t.token_prefix+'...</code></td>';h+='<td>'+(t.enabled?'<span class="badge badge-ok">正常</span>':'<span class="badge badge-err">已撤销</span>')+'</td>';h+='<td style="font-size:11px;color:var(--dim)">'+t.created_at+'</td>';h+='<td>'+(t.enabled?'<button class="btn btn-d" style="font-size:10px;padding:2px 8px" onclick="delTk('+t.id+')">撤销</button>':'')+'</td></tr>'});h+='</table>';document.getElementById('tokensTable').innerHTML=h}
var ur=await fetch('/api/user/usage',{headers:H});if(ur.ok){var uu=await ur.json(),s=uu.stats;
document.getElementById('statRequests').textContent=s.total_requests;document.getElementById('statTokens').textContent=(s.total_tokens||0).toLocaleString();document.getElementById('statCost').textContent=(s.total_cost||0).toFixed(4);
var byModel=s.by_model||[];
if(byModel.length>0){
document.getElementById('usageBreakdown').style.display='block';
var mh='<table><tr><th>模型</th><th>请求数</th><th>Token数</th><th>费用</th></tr>';
byModel.forEach(function(m){mh+='<tr><td class="mono">'+m.model+'</td><td>'+m.n+'</td><td>'+m.t.toLocaleString()+'</td><td>$'+m.cost+'</td></tr>'});
mh+='</table>';document.getElementById('byModelTable').innerHTML=mh;
}
var logs=uu.logs||[];if(!logs.length){document.getElementById('logsTable').innerHTML='<div class="empty">暂无使用记录，开始调用 API 吧</div>'}
else{var lh='<table><tr><th>时间</th><th>模型</th><th>厂商</th><th>Token数</th><th>费用</th><th>状态</th></tr>';logs.forEach(function(l){lh+='<tr><td style="font-size:11px;color:var(--dim)">'+l.created_at+'</td><td>'+l.model+'</td><td>'+l.provider+'</td><td>'+l.total_tokens.toLocaleString()+'</td><td>$'+l.quota_used.toFixed(5)+'</td><td>'+(l.status==='success'?'<span class="badge badge-ok">成功</span>':'<span class="badge badge-err">失败</span>')+'</td></tr>'});lh+='</table>';document.getElementById('logsTable').innerHTML=lh}}}
}catch(e){toast('加载失败，请刷新重试',true)}}

async function createToken(){try{var r=await fetch('/api/user/tokens',{method:'POST',headers:H,body:JSON.stringify({name:'新建令牌'})});if(!r.ok){toast('创建失败',true);return}var d=await r.json();if(d.token&&d.token.token)showTokenModal(d.token.token);else{toast('令牌已创建');load()}}catch(e){toast('创建失败',true)}}
async function delTk(tid){if(!confirm('确定撤销此令牌？将立即失效。'))return;try{await fetch('/api/user/tokens/'+tid,{method:'DELETE',headers:H});toast('令牌已撤销');load()}catch(e){toast('撤销失败',true)}}
async function changePassword(){var o=document.getElementById('oldPw').value,n=document.getElementById('newPw').value;if(n.length<6){toast('新密码至少6位',true);return}try{var r=await fetch('/api/auth/password',{method:'PATCH',headers:H,body:JSON.stringify({old_password:o,new_password:n})});if(!r.ok){var e=await r.json();toast(e.detail||'修改失败',true);return}toast('密码已修改');closePw()}catch(e){toast('修改失败',true)}}
document.getElementById('pwModal').addEventListener('click',function(e){if(e.target===this)closePw()});
document.getElementById('tokenModal').addEventListener('click',function(e){if(e.target===this)closeTokenModal()});
var newTk=localStorage.getItem('aiaiai_new_token');
if(newTk){document.getElementById('welcomeBanner').style.display='block';document.getElementById('welcomeToken').textContent=newTk;localStorage.removeItem('aiaiai_new_token')}
load();
</script></body></html>
