<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - AI Token Proxy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:700;font-size:1rem;color:#58a6ff}
.logo a{color:inherit;text-decoration:none}
nav{display:flex;gap:1rem;align-items:center}
nav a{color:#8b949e;font-size:.82rem;text-decoration:none;padding:.3rem .5rem;border-radius:4px;transition:color .2s;cursor:pointer}
nav a:hover{color:#f0f6fc}
nav a.active{color:#58a6ff;background:#1f2937}
.user-info{display:flex;align-items:center;gap:.6rem;font-size:.82rem;color:#8b949e}
.user-info .name{color:#f0f6fc}
.logout-btn{background:none;border:1px solid #30363d;color:#f85149;padding:.25rem .6rem;border-radius:4px;cursor:pointer;font-size:.75rem}
.logout-btn:hover{background:#f8514920}
main{max-width:960px;margin:0 auto;padding:1.5rem}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1rem;font-weight:600;margin-bottom:1rem;color:#f0f6fc}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem}
.stat{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:1rem;text-align:center}
.stat .num{font-size:1.6rem;font-weight:700;color:#58a6ff}
.stat .label{font-size:.75rem;color:#8b949e;margin-top:.2rem}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:.5rem .75rem;color:#8b949e;font-weight:500;border-bottom:1px solid #30363d;font-size:.75rem;text-transform:uppercase}
td{padding:.6rem .75rem;border-bottom:1px solid #21262d}
.mono{font-family:'SF Mono',Consolas,monospace;font-size:.78rem;color:#58a6ff}
code{background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:.15rem .35rem;font-size:.75rem;cursor:pointer;color:#7ee787}
code:hover{background:#1f2937}
.badge{padding:.15rem .5rem;border-radius:10px;font-size:.7rem;font-weight:600}
.badge-green{background:#23863620;color:#3fb950;border:1px solid #23863630}
.badge-red{background:#f8514920;color:#f85149;border:1px solid #f8514930}
.badge-gray{background:#30363d40;color:#8b949e}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem .9rem;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;font-size:.8rem;cursor:pointer;transition:all .2s}
.btn:hover{background:#30363d;color:#f0f6fc}
.btn-primary{background:#238636;border-color:#238636;color:#fff;font-weight:500}
.btn-primary:hover{background:#2ea043}
.btn-danger{color:#f85149;border-color:#f8514930}
.btn-danger:hover{background:#f8514920;border-color:#f85149}
.actions{display:flex;gap:.5rem;margin-top:1rem}
.empty{text-align:center;padding:2rem;color:#484f58;font-size:.85rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#238636;color:#fff;padding:.6rem 1rem;border-radius:6px;font-size:.8rem;z-index:100;animation:slideIn .3s ease}
.toast.error{background:#da3633}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal{display:none;position:fixed;inset:0;background:#00000080;z-index:50;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1.5rem;width:100%;max-width:360px}
.modal-content input{width:100%;padding:.5rem .75rem;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#f0f6fc;font-size:.85rem;outline:none;margin:.5rem 0}
.modal-content input:focus{border-color:#58a6ff}
</style>
</head>
<body>
<header>
  <div class="logo"><a href="/">⚡ AI Token Proxy</a></div>
  <nav>
    <a class="active" id="navDashboard">Dashboard</a>
    <a onclick="showPwModal()">Change Password</a>
    <span class="user-info"><span class="name" id="userName">...</span><button class="logout-btn" onclick="logout()">Logout</button></span>
  </nav>
</header>

<main>
  <!-- Stats -->
  <div class="stats" id="statsRow">
    <div class="stat"><div class="num" id="statQuota">-</div><div class="label">Quota Left ($)</div></div>
    <div class="stat"><div class="num" id="statRequests">-</div><div class="label">Requests</div></div>
    <div class="stat"><div class="num" id="statTokens">-</div><div class="label">Tokens Used</div></div>
    <div class="stat"><div class="num" id="statCost">-</div><div class="label">Cost ($)</div></div>
  </div>

  <!-- Tokens -->
  <div class="card">
    <h2>Your API Tokens</h2>
    <div class="actions" style="margin-top:0;margin-bottom:1rem">
      <button class="btn btn-primary" onclick="createToken()">+ New Token</button>
    </div>
    <div id="tokensTable"><div class="empty">Loading...</div></div>
  </div>

  <!-- Usage Logs -->
  <div class="card">
    <h2>Recent Usage</h2>
    <div id="logsTable"><div class="empty">Loading...</div></div>
  </div>
</main>

<!-- Change Password Modal -->
<div class="modal" id="pwModal">
  <div class="modal-content">
    <h2 style="margin-bottom:1rem">Change Password</h2>
    <input type="password" id="oldPw" placeholder="Current password">
    <input type="password" id="newPw" placeholder="New password (min 4 chars)">
    <div class="actions" style="justify-content:flex-end">
      <button class="btn" onclick="document.getElementById('pwModal').classList.remove('show')">Cancel</button>
      <button class="btn btn-primary" onclick="changePassword()">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" style="display:none"></div>

<script>
const JWT = localStorage.getItem('aiaiai_jwt');
const USER = JSON.parse(localStorage.getItem('aiaiai_user') || '{}');
const H = { 'Authorization': 'Bearer ' + JWT, 'Content-Type': 'application/json' };

if (!JWT) { window.location.href = '/login'; }
document.getElementById('userName').textContent = USER.name || USER.email;

function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast' + (isErr ? ' error' : ''); el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2500);
}

function logout() {
  localStorage.removeItem('aiaiai_jwt');
  localStorage.removeItem('aiaiai_user');
  window.location.href = '/login';
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Copied!'));
}

async function loadDashboard() {
  try {
    const r = await fetch('/api/auth/me', { headers: H });
    if (!r.ok) { logout(); return; }
    const me = await r.json();
    const u = me.user;
    document.getElementById('statQuota').textContent = u.quota < 0 ? 'Unlimited' : Math.max(0, u.quota - u.used_quota).toFixed(3);
    
    // Render tokens
    const tokens = me.tokens || [];
    if (tokens.length === 0) {
      document.getElementById('tokensTable').innerHTML = '<div class="empty">No tokens yet. Create one to start using the API.</div>';
    } else {
      let html = '<table><tr><th>Name</th><th>Token</th><th>Status</th><th>Created</th><th></th></tr>';
      tokens.forEach(t => {
        html += '<tr><td>'+esc(t.name)+'</td><td><code onclick="copyText(\''+t.token_prefix+'...\')">'+t.token_prefix+'...</code></td>'
          + '<td>'+(t.enabled?'<span class="badge badge-green">Active</span>':'<span class="badge badge-red">Revoked</span>')+'</td>'
          + '<td>'+t.created_at+'</td>'
          + '<td>'+(t.enabled?'<button class="btn btn-danger" style="font-size:.7rem;padding:.2rem .5rem" onclick="deleteToken('+t.id+')">Revoke</button>':'')+'</td></tr>';
      });
      html += '</table>';
      document.getElementById('tokensTable').innerHTML = html;
    }

    // Load usage
    const ur = await fetch('/api/user/usage', { headers: H });
    if (ur.ok) {
      const usage = await ur.json();
      const s = usage.stats;
      document.getElementById('statRequests').textContent = s.total_requests;
      document.getElementById('statTokens').textContent = (s.total_tokens || 0).toLocaleString();
      document.getElementById('statCost').textContent = (s.total_cost || 0).toFixed(4);

      const logs = usage.logs || [];
      if (logs.length === 0) {
        document.getElementById('logsTable').innerHTML = '<div class="empty">No usage yet. Start making API calls!</div>';
      } else {
        let lh = '<table><tr><th>Time</th><th>Model</th><th>Provider</th><th>Tokens</th><th>Cost</th><th>Status</th></tr>';
        logs.forEach(l => {
          lh += '<tr><td>'+l.created_at+'</td><td>'+l.model+'</td><td>'+l.provider+'</td><td>'+l.total_tokens.toLocaleString()+'</td>'
            + '<td>$'+l.quota_used.toFixed(5)+'</td>'
            + '<td>'+(l.status==='success'?'<span class="badge badge-green">OK</span>':'<span class="badge badge-red">Error</span>')+'</td></tr>';
        });
        lh += '</table>';
        document.getElementById('logsTable').innerHTML = lh;
      }
    }
  } catch(e) {
    toast('Failed to load dashboard', true);
  }
}

async function createToken() {
  try {
    const r = await fetch('/api/user/tokens', { method:'POST', headers: H, body: JSON.stringify({name:'New Token'}) });
    if (!r.ok) { toast('Failed to create token', true); return; }
    const data = await r.json();
    toast('Token created: ' + data.token.token_prefix + '...');
    loadDashboard();
  } catch(e) { toast('Failed to create token', true); }
}

async function deleteToken(tid) {
  if (!confirm('Revoke this token? It will stop working immediately.')) return;
  try {
    await fetch('/api/user/tokens/' + tid, { method:'DELETE', headers: H });
    toast('Token revoked');
    loadDashboard();
  } catch(e) { toast('Failed to revoke', true); }
}

function showPwModal() { document.getElementById('pwModal').classList.add('show'); }
async function changePassword() {
  const oldPw = document.getElementById('oldPw').value;
  const newPw = document.getElementById('newPw').value;
  if (newPw.length < 4) { toast('New password too short', true); return; }
  try {
    const r = await fetch('/api/auth/password', { method:'PATCH', headers: H, body: JSON.stringify({old_password:oldPw,new_password:newPw}) });
    if (!r.ok) { const e = await r.json(); toast(e.detail || 'Failed', true); return; }
    toast('Password changed');
    document.getElementById('pwModal').classList.remove('show');
    document.getElementById('oldPw').value = '';
    document.getElementById('newPw').value = '';
  } catch(e) { toast('Failed', true); }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Close modal on backdrop click
document.getElementById('pwModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

loadDashboard();
</script>
</body>
</html>
