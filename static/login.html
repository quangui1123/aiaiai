<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AI Token Proxy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{width:100%;max-width:420px;padding:2rem}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:2.5rem 2rem}
h1{font-size:1.4rem;font-weight:600;margin-bottom:.25rem;color:#f0f6fc}
.sub{color:#8b949e;font-size:.85rem;margin-bottom:1.8rem}
.form-group{margin-bottom:1.2rem}
label{display:block;font-size:.8rem;color:#8b949e;margin-bottom:.35rem;font-weight:500}
input{width:100%;padding:.6rem .75rem;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#f0f6fc;font-size:.9rem;outline:none;transition:border-color .2s}
input:focus{border-color:#58a6ff}
input::placeholder{color:#484f58}
.btn{width:100%;padding:.65rem;background:#238636;color:#fff;border:none;border-radius:6px;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:.5rem}
.btn:hover{background:#2ea043}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid #30363d;color:#c9d1d9;margin-top:.6rem}
.btn-outline:hover{background:#21262d}
.error{background:#49020233;border:1px solid #f8514933;color:#f85149;padding:.6rem .75rem;border-radius:6px;font-size:.8rem;margin-bottom:1rem;display:none}
.error.show{display:block}
.success{background:#1b3a1b33;border:1px solid #3fb95033;color:#3fb950;padding:.6rem .75rem;border-radius:6px;font-size:.8rem;margin-bottom:1rem;display:none}
.success.show{display:block}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.logo{font-weight:700;font-size:1.1rem;color:#58a6ff}
.lang-btn{background:none;border:1px solid #30363d;color:#8b949e;padding:.3rem .6rem;border-radius:6px;cursor:pointer;font-size:.75rem}
.lang-btn:hover{color:#f0f6fc;border-color:#58a6ff}
.toggle-link{text-align:center;margin-top:1.2rem;font-size:.82rem;color:#8b949e}
.toggle-link a{color:#58a6ff;cursor:pointer;text-decoration:none}
.toggle-link a:hover{text-decoration:underline}
.hidden{display:none!important}
.footer{text-align:center;margin-top:1.5rem;font-size:.75rem;color:#484f58}
.footer a{color:#58a6ff;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="logo">⚡ AI Token Proxy</div>
    <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
  </div>

  <!-- Error / Success -->
  <div class="error" id="errMsg"></div>
  <div class="success" id="successMsg"></div>

  <!-- Login Form -->
  <div class="card" id="loginForm">
    <h1 id="loginTitle">Sign in</h1>
    <p class="sub" id="loginSub">Use your email to sign in to your account</p>
    <div class="form-group">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" onclick="doLogin()" id="loginBtn">Sign in</button>
    <div class="toggle-link" id="loginToggle">
      Don't have an account? <a onclick="showRegister()">Create one</a>
    </div>
  </div>

  <!-- Register Form -->
  <div class="card hidden" id="registerForm">
    <h1 id="regTitle">Create account</h1>
    <p class="sub" id="regSub">Register with your email to get started</p>
    <div class="form-group">
      <label for="regEmail">Email</label>
      <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="regPassword">Password</label>
      <input type="password" id="regPassword" placeholder="At least 4 characters" autocomplete="new-password">
    </div>
    <button class="btn" onclick="doRegister()" id="regBtn">Create account</button>
    <div class="toggle-link" id="regToggle">
      Already have an account? <a onclick="showLogin()">Sign in</a>
    </div>
  </div>

  <div class="footer">
    <span id="footerText">Self-hosted AI API aggregation proxy</span> · <a href="/">Home</a> · <a href="/pricing">Pricing</a>
  </div>
</div>

<script>
// Language
const L = { zh: {
  loginTitle:'登录', loginSub:'使用邮箱登录你的账户', regTitle:'注册', regSub:'用邮箱注册即可开始使用',
  loginBtn:'登录', regBtn:'创建账户',
  loginToggle:'还没有账户？', loginToggleLink:'注册一个', regToggle:'已有账户？', regToggleLink:'登录',
  footerText:'自托管 AI API 聚合代理',
  errEmail:'请输入有效邮箱', errPassword:'密码至少4位', errLogin:'邮箱或密码错误', errRegister:'注册失败，邮箱可能已被使用',
  successRegistered:'注册成功！正在跳转...', successLogin:'登录成功！正在跳转...'
}, en: {
  loginTitle:'Sign in', loginSub:'Use your email to sign in to your account', regTitle:'Create account', regSub:'Register with your email to get started',
  loginBtn:'Sign in', regBtn:'Create account',
  loginToggle:"Don't have an account? ", loginToggleLink:'Create one', regToggle:'Already have an account? ', regToggleLink:'Sign in',
  footerText:'Self-hosted AI API aggregation proxy',
  errEmail:'Please enter a valid email', errPassword:'Password must be at least 4 characters', errLogin:'Invalid email or password', errRegister:'Registration failed; email may already be in use',
  successRegistered:'Account created! Redirecting...', successLogin:'Signed in! Redirecting...'
}};
let lang = 'zh';
function t(key) { return L[lang][key] || key; }
function toggleLang() { lang = lang==='zh'?'en':'zh'; document.getElementById('langBtn').textContent = lang==='zh'?'EN':'中文'; applyLang(); }
function applyLang() {
  document.getElementById('loginTitle').textContent = t('loginTitle');
  document.getElementById('loginSub').textContent = t('loginSub');
  document.getElementById('regTitle').textContent = t('regTitle');
  document.getElementById('regSub').textContent = t('regSub');
  document.getElementById('loginBtn').textContent = t('loginBtn');
  document.getElementById('regBtn').textContent = t('regBtn');
  document.getElementById('loginToggle').innerHTML = t('loginToggle') + ' <a onclick="showRegister()">' + t('loginToggleLink') + '</a>';
  document.getElementById('regToggle').innerHTML = t('regToggle') + ' <a onclick="showLogin()">' + t('regToggleLink') + '</a>';
  document.getElementById('footerText').textContent = t('footerText');
}

function showMsg(type, key) {
  const el = type==='error' ? document.getElementById('errMsg') : document.getElementById('successMsg');
  const other = type==='error' ? document.getElementById('successMsg') : document.getElementById('errMsg');
  other.classList.remove('show');
  el.textContent = t(key); el.classList.add('show');
}
function hideMsgs() { document.getElementById('errMsg').classList.remove('show'); document.getElementById('successMsg').classList.remove('show'); }

function showRegister() { hideMsgs(); document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); }
function showLogin() { hideMsgs(); document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); }

// Check if already logged in
const savedToken = localStorage.getItem('aiaiai_jwt');
if (savedToken) {
  fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + savedToken } })
    .then(r => { if (r.ok) window.location.href = '/dashboard'; });
}

async function doLogin() {
  hideMsgs();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email.includes('@')) { showMsg('error','errEmail'); return; }
  if (password.length < 4) { showMsg('error','errPassword'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '...';
  try {
    const r = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password})
    });
    const data = await r.json();
    if (!r.ok) { showMsg('error','errLogin'); return; }
    localStorage.setItem('aiaiai_jwt', data.token);
    localStorage.setItem('aiaiai_user', JSON.stringify(data.user));
    showMsg('success','successLogin');
    setTimeout(() => {
      if (data.user.is_admin) window.location.href = '/admin';
      else window.location.href = '/dashboard';
    }, 800);
  } catch(e) { showMsg('error','errLogin'); }
  finally { btn.disabled = false; btn.textContent = t('loginBtn'); }
}

async function doRegister() {
  hideMsgs();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!email.includes('@')) { showMsg('error','errEmail'); return; }
  if (password.length < 4) { showMsg('error','errPassword'); return; }
  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = '...';
  try {
    const r = await fetch('/api/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password,name:email.split('@')[0]})
    });
    const data = await r.json();
    if (!r.ok) { showMsg('error','errRegister'); return; }
    localStorage.setItem('aiaiai_jwt', data.token);
    localStorage.setItem('aiaiai_user', JSON.stringify(data.user));
    showMsg('success','successRegistered');
    setTimeout(() => window.location.href = '/dashboard', 800);
  } catch(e) { showMsg('error','errRegister'); }
  finally { btn.disabled = false; btn.textContent = t('regBtn'); }
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!document.getElementById('registerForm').classList.contains('hidden')) doRegister();
    else doLogin();
  }
});

applyLang();
</script>
</body>
</html>
