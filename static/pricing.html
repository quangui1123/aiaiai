<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Token Proxy - Pricing</title>
<style>
:root{
  --bg:#0b0d14;--surface:#131620;--border:#1e2233;--text:#dde1ed;--dim:#747b91;
  --accent:#5c7cfa;--green:#38d9a9;--radius:6px;
  --font:system-ui,-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:16px;color:var(--accent);font-weight:600}
header nav a{color:var(--dim);text-decoration:none;font-size:13px;margin-left:20px;transition:color .12s}
header nav a:hover{color:var(--text)}
.hero{text-align:center;padding:40px 20px 20px}
.hero h2{font-size:22px;margin-bottom:6px}
.hero p{color:var(--dim);font-size:14px;max-width:500px;margin:0 auto}
.container{max-width:1000px;margin:0 auto;padding:0 24px 60px}
.provider-section{margin-bottom:32px}
.provider-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.provider-header h3{font-size:15px}
.provider-header .count{font-size:11px;color:var(--dim)}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
th{font-weight:500;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.3px;background:rgba(0,0,0,.2)}
td{color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.01)}
.price{font-family:'SF Mono','Consolas',monospace;font-size:12px}
.price span{color:var(--dim);font-size:10px}
.footer{text-align:center;padding:20px;color:var(--dim);font-size:11px;border-top:1px solid var(--border)}
.empty{text-align:center;padding:48px;color:var(--dim);font-size:14px}
a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>

<header>
  <h1>AI Token Proxy</h1>
  <nav>
    <a href="/">Home</a>
    <a href="/pricing">Pricing</a>
    <a href="/docs">API Docs</a>
  </nav>
</header>

<div class="hero">
  <h2>Model Pricing</h2>
  <p>Unified pricing across all AI providers. All prices in USD per unit.</p>
</div>

<div class="container" id="content">
  <div class="empty">Loading...</div>
</div>

<footer class="footer">
  AI Token Proxy &mdash; Unified API Gateway for all LLM providers
</footer>

<script>
async function load(){
  try{
    const r=await fetch('/api/public/models');
    const{models}=await r.json();
    if(!models.length){document.getElementById('content').innerHTML='<div class="empty">No models configured yet</div>';return}
    // Group by provider
    const groups={};
    models.forEach(m=>{
      if(!groups[m.provider])groups[m.provider]=[];
      groups[m.provider].push(m);
    });
    let html='';
    for(const[p,mList]of Object.entries(groups)){
      html+='<div class="provider-section"><div class="provider-header"><h3>'+p+'</h3><span class="count">'+mList.length+' models</span></div>';
      html+='<table><thead><tr><th>Model</th><th>Input Price</th><th>Output Price</th><th>Unit</th></tr></thead><tbody>';
      mList.forEach(m=>{
        html+=`<tr>
          <td><strong>${m.display_name}</strong><br><span style="font-size:10px;color:var(--dim)" class="mono">${m.id}</span></td>
          <td class="price">$${m.input_price} <span>/ ${m.unit_size.toLocaleString()} tokens</span></td>
          <td class="price">$${m.output_price} <span>/ ${m.unit_size.toLocaleString()} tokens</span></td>
          <td>${m.unit_size.toLocaleString()} tokens</td>
        </tr>`;
      });
      html+='</tbody></table></div>';
    }
    document.getElementById('content').innerHTML=html;
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty">Failed to load pricing: '+e.message+'</div>'
  }
}
load();
</script>
</body>
</html>
