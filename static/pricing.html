<style>
:root{--bg:#0b0d14;--surface:#131620;--border:#1e2233;--text:#dde1ed;--dim:#747b91;--accent:#5c7cfa;--green:#38d9a9;--radius:8px;--font:system-ui,-apple-system,sans-serif;--t:all .18s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:10}
.logo{font-weight:700;font-size:14px;color:var(--accent);text-decoration:none}
nav{display:flex;gap:12px}nav a{padding:6px 12px;color:var(--dim);text-decoration:none;font-size:13px;border-radius:6px;transition:var(--t)}nav a:hover{color:var(--text);background:rgba(255,255,255,.04)}
.container{max-width:1000px;margin:0 auto;padding:32px 24px 64px}
.hero{text-align:center;padding:40px 20px 20px}
.hero h2{font-size:24px;font-weight:700;margin-bottom:6px}
.hero p{color:var(--dim);font-size:14px}
.provider-section{margin-bottom:28px;animation:fadeUp .4s ease}
.provider-section:nth-child(2){animation-delay:.05s}.provider-section:nth-child(3){animation-delay:.1s}
.provider-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.provider-header h3{font-size:15px;color:var(--accent)}
.provider-header .count{font-size:11px;color:var(--dim)}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:var(--t)}
tr:hover td{background:rgba(255,255,255,.015)}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
th{font-weight:500;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.4px;background:rgba(0,0,0,.2)}
td{color:var(--text);transition:background .12s}tr:last-child td{border-bottom:none}
.price{font-family:'SF Mono',Consolas,monospace;font-size:12px}
.mono{font-family:'SF Mono',Consolas,monospace;font-size:10px;color:var(--dim)}
footer{text-align:center;padding:24px;color:var(--dim);font-size:11px;border-top:1px solid var(--border)}
.empty{text-align:center;padding:48px;color:var(--dim);font-size:14px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
</style>
</head>
<body>

<div class="container" id="content"><div class="empty"><span class="spinner"></span> 鍔犺浇涓?..</div></div>
<footer>AI Token Proxy 鈥?鑷墭绠?LLM API 鑱氬悎缃戝叧</footer>
<script>
async function load(){try{var r=await fetch('/api/public/models');var d=await r.json();if(!d.models||!d.models.length){document.getElementById('content').innerHTML='<div class="empty">鏆傛棤妯″瀷鏁版嵁</div>';return}

</script></body></html>
