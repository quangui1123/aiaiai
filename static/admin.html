<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理后台 — AI Token Proxy</title>
<style>
:root{--bg:#0b0d14;--surface:#131620;--border:#1e2233;--text:#dde1ed;--dim:#747b91;--accent:#5c7cfa;--green:#38d9a9;--red:#ff6b6b;--yellow:#fcc419;--radius:8px;--font:system-ui,-apple-system,sans-serif;--transition:all .18s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar h1{font-size:14px;padding:0 16px 20px;color:var(--accent);font-weight:700}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;color:var(--dim);cursor:pointer;font-size:13px;border:none;background:none;width:100%;text-align:left;transition:var(--transition)}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03);transform:translateX(3px)}
.nav-item.active{color:var(--text);background:rgba(92,124,250,.08);border-right:3px solid var(--accent)}
.logout-btn{margin-top:auto;padding:10px 16px;border-top:1px solid var(--border);color:var(--dim);cursor:pointer;font-size:12px;transition:var(--transition)}
.logout-btn:hover{color:var(--red)}
.main{flex:1;overflow-y:auto;padding:24px 28px}
.section-title{font-size:13px;color:var(--dim);margin-bottom:14px;font-weight:500}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;transition:var(--transition)}
.card:hover{border-color:rgba(92,124,250,.25)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:var(--transition)}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.stat-card .l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-card .v{font-size:22px;font-weight:700;transition:var(--transition)}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
th{font-weight:500;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.4px}
td{color:var(--text);transition:background .12s}tr:hover td{background:rgba(255,255,255,.015)}
.form-row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-end;flex-wrap:wrap}
.form-g{display:flex;flex-direction:column;gap:3px}
.form-g label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
input,select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;font-family:var(--font);outline:none;transition:var(--transition)}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(92,124,250,.15)}
.btn{padding:6px 13px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);font-family:var(--font);transition:var(--transition);display:inline-flex;align-items:center;gap:4px;white-space:nowrap;background:transparent;color:var(--text)}
.btn:hover{transform:translateY(-1px)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{opacity:.88;box-shadow:0 2px 8px rgba(92,124,250,.3)}
.btn-d{color:var(--red);border-color:rgba(255,107,107,.3)}.btn-d:hover{background:rgba(255,107,107,.08)}
.btn-sm{font-size:10px;padding:3px 8px}
.mono{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:var(--accent)}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.bg{background:rgba(56,217,169,.12);color:var(--green)}.br{background:rgba(255,107,107,.12);color:var(--red)}.by{background:rgba(252,196,25,.12);color:var(--yellow)}
.mt2{margin-top:12px}.mt3{margin-top:18px}.mb2{margin-bottom:12px}
.fb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.empty{padding:32px;text-align:center;color:var(--dim);font-size:13px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.page-enter{animation:fadeUp .3s ease}
.loading-spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeUp .15s ease}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:90%;max-width:420px;animation:fadeUp .2s ease}
.modal h3{font-size:14px;margin-bottom:14px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;padding:10px 18px;border-radius:6px;font-size:12px;z-index:200;animation:fadeUp .25s ease}
</style>
</head>
<body>
<div class="sidebar">
<h1>⚡ 管理后台</h1>
<button class="nav-item active" data-p="概览">📊 概览</button>
<button class="nav-item" data-p="用户">👥 用户管理</button>
<button class="nav-item" data-p="渠道">🔑 渠道管理</button>
<button class="nav-item" data-p="令牌">🎫 令牌管理</button>
<button class="nav-item" data-p="定价">💰 模型定价</button>
<button class="nav-item" data-p="日志">📋 使用日志</button>
<div class="logout-btn" onclick="logout()">退出登录</div>
</div>
<main class="main" id="main"></main>

<script>
var JWT=localStorage.getItem('aiaiai_jwt'),USER=JSON.parse(localStorage.getItem('aiaiai_user')||'{}');
if(!JWT||!USER.is_admin)window.location.href='/login';
var H={'Authorization':'Bearer '+JWT},page='概览';

function API(p,o){return fetch(p,{...o||{},headers:{...H,...(o&&o.headers||{})}})}
function nav(p){page=p;document.querySelectorAll('.nav-item').forEach(function(e){e.classList.toggle('active',e.dataset.p===p)});render()}
function cp(t){navigator.clipboard.writeText(t)}
function toast(m){var d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove()},2200)}
function modal(t,b,ok,cb){var e=document.createElement('div');e.className='modal-overlay';e.innerHTML='<div class="modal"><h3>'+t+'</h3>'+b+'<div class="fb mt3"><button class="btn" onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="btn btn-p" id="okbtn">'+ok+'</button></div></div>';document.body.appendChild(e);e.querySelector('#okbtn').onclick=async function(){try{await cb(e)}catch(err){alert(err)}e.remove()};e.querySelector('input')&&e.querySelector('input').focus()}
function logout(){localStorage.clear();window.location.href='/login'}

document.querySelectorAll('.nav-item').forEach(function(e){e.addEventListener('click',function(){nav(e.dataset.p)})});

async function render(){
var o=document.getElementById('main');o.innerHTML='<div class="empty"><span class="loading-spinner"></span> 加载中...</div>';
try{
switch(page){
case '概览':return renderDash(o);
case '用户':return renderUsers(o);
case '渠道':return renderChannels(o);
case '令牌':return renderTokens(o);
case '定价':return renderModels(o);
case '日志':return renderLogs(o);
}
}catch(e){o.innerHTML='<div class="empty" style="color:var(--red)">错误: '+e.message+'</div>'}
}

async function renderDash(o){
var r=await API('/admin/api/stats'),s=await r.json();
var pr=await API('/admin/api/providers'),pd=await pr.json();
var configured=(pd.providers||[]).filter(function(p){return p.configured}).length;
var warn=configured===0?'<div class="card" style="border-color:var(--yellow);margin-bottom:16px"><strong style="color:var(--yellow)">⚠ 尚未配置渠道</strong><p style="font-size:12px;color:var(--dim);margin-top:6px">请前往「渠道管理」添加各厂商 API Key，否则用户无法调用任何模型。</p></div>':'';
o.innerHTML='<div class="page-enter">'+warn+'<div style="margin-bottom:16px;color:var(--dim);font-size:12px">管理员: '+USER.email+' · 已配置 '+configured+' 个厂商渠道</div><div class="stats-grid"><div class="stat-card"><div class="l">近30天请求</div><div class="v">'+s.total_requests+'</div></div><div class="stat-card"><div class="l">总Token消耗</div><div class="v">'+s.total_tokens.toLocaleString()+'</div></div><div class="stat-card"><div class="l">输入Token</div><div class="v">'+s.total_prompt_tokens.toLocaleString()+'</div></div><div class="stat-card"><div class="l">输出Token</div><div class="v">'+s.total_completion_tokens.toLocaleString()+'</div></div><div class="stat-card"><div class="l">总费用(USD)</div><div class="v">$'+s.total_cost+'</div></div></div><div class="card"><div class="section-title">按厂商统计</div><table><thead><tr><th>厂商</th><th>请求数</th><th>Token数</th><th>费用</th></tr></thead><tbody>'+((s.by_provider||[]).map(function(p){return '<tr><td>'+p.provider+'</td><td>'+p.n+'</td><td>'+p.t.toLocaleString()+'</td><td>$'+p.cost+'</td></tr>'}).join('')||'<tr><td colspan="4" class="empty">暂无数据</td></tr>')+'</tbody></table></div><div class="card mt3"><div class="section-title">按模型统计</div><table><thead><tr><th>模型</th><th>请求数</th><th>Token数</th><th>费用</th></tr></thead><tbody>'+((s.by_model||[]).map(function(p){return '<tr><td class="mono">'+p.model+'</td><td>'+p.n+'</td><td>'+p.t.toLocaleString()+'</td><td>$'+p.cost+'</td></tr>'}).join('')||'<tr><td colspan="4" class="empty">暂无数据</td></tr>')+'</tbody></table></div></div>';
}

async function renderUsers(o){
var r=await API('/admin/api/users'),d=await r.json(),users=d.users||[];
o.innerHTML='<div class="page-enter"><div class="fb mb2"><div class="section-title">用户列表 ('+users.length+'人)</div></div><div class="card"><table><thead><tr><th>ID</th><th>邮箱</th><th>名称</th><th>角色</th><th>额度</th><th>已用</th><th>速率</th><th>令牌数</th><th>状态</th><th>操作</th></tr></thead><tbody>'+users.map(function(u){return '<tr><td class="mono">'+u.id+'</td><td>'+u.email+'</td><td>'+(u.name||'-')+'</td><td><span class="badge '+(u.is_admin?'by':'bg')+'">'+(u.is_admin?'管理员':'用户')+'</span></td><td>'+(u.quota<0?'无限':'$'+u.quota)+'</td><td>$'+u.used_quota.toFixed(3)+'</td><td>'+u.rate_limit_rpm+'</td><td>'+(u.token_count||0)+'</td><td><span class="badge '+(u.enabled?'bg':'br')+'">'+(u.enabled?'启用':'禁用')+'</span></td><td><button class="btn btn-sm" onclick="editUser('+u.id+')">编辑</button><button class="btn btn-sm" onclick="addUserQ('+u.id+')">加额度</button><button class="btn btn-sm '+(u.enabled?'btn-d':'')+'" onclick="toggleUser('+u.id+','+!u.enabled+')">'+(u.enabled?'禁用':'启用')+'</button></td></tr>'}).join('')||'<tr><td colspan="10" class="empty">暂无用户</td></tr>'}</tbody></table></div></div>';
}

function editUser(uid){
API('/admin/api/users').then(function(r){return r.json()}).then(function(data){
var u=data.users.find(function(x){return x.id===uid});if(!u)return;
modal('编辑用户 #'+uid,'<div class="form-g"><label>邮箱</label><input value="'+u.email+'" disabled></div><div class="form-row mt2"><div class="form-g"><label>额度($) (-1=无限)</label><input id="eu-q" type="number" step="0.01" value="'+u.quota+'"></div><div class="form-g"><label>速率(RPM)</label><input id="eu-r" type="number" value="'+u.rate_limit_rpm+'" min="1"></div></div>','保存',async function(){var q=parseFloat(document.getElementById('eu-q').value),rpm=parseInt(document.getElementById('eu-r').value);await API('/admin/api/users/'+uid,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({quota:q,rate_limit_rpm:rpm})});toast('已更新');render()})})}

function toggleUser(uid,en){if(!confirm((en?'启用':'禁用')+'此用户？'))return;API('/admin/api/users/'+uid,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:en})}).then(function(){toast('已'+(en?'启用':'禁用'));render()})}

function addUserQ(uid){modal('增加用户额度','<div class="form-g"><label>金额(USD)</label><input id="uq-v" type="number" step="0.01" min="0.01" value="1"></div>','确认',async function(){await API('/admin/api/users/'+uid+'/quota',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount:parseFloat(document.getElementById('uq-v').value)})});toast('用户额度已增加');render()})}

async function renderChannels(o){
var r=await API('/admin/api/channels'),d=await r.json(),chs=d.channels||[];
o.innerHTML='<div class="page-enter"><div class="fb mb2"><div class="section-title">渠道列表</div><button class="btn btn-p" onclick="addCh()">+ 添加渠道</button></div><div class="card"><table><thead><tr><th>ID</th><th>厂商</th><th>名称</th><th>密钥</th><th>权重</th><th>状态</th><th>操作</th></tr></thead><tbody>'+chs.map(function(c){return '<tr><td class="mono">'+c.id+'</td><td>'+c.provider_name+'</td><td>'+(c.name||'-')+'</td><td class="mono">'+c.api_key+'</td><td>'+c.weight+'</td><td><span class="badge '+(c.enabled?'bg':'br')+'">'+(c.enabled?'启用':'禁用')+'</span></td><td><button class="btn btn-sm" onclick="editCh('+c.id+')">编辑</button><button class="btn btn-sm btn-d" onclick="delCh('+c.id+')">删除</button></td></tr>'}).join('')||'<tr><td colspan="7" class="empty">暂无渠道，请先添加</td></tr>'}</tbody></table></div></div>';
}

async function addCh(){
var r=await API('/admin/api/providers'),d=await r.json();
var opts=d.providers.map(function(p){return '<option value="'+p.id+'">'+p.name+'</option>'}).join('');
modal('添加渠道','<div class="form-g"><label>厂商</label><select id="ch-p">'+opts+'</select></div><div class="form-g mt2"><label>名称</label><input id="ch-n" placeholder="例如: 密钥#1"></div><div class="form-g mt2"><label>API密钥</label><input id="ch-k" placeholder="sk-..." type="password"></div><div class="form-g mt2"><label>权重</label><input id="ch-w" type="number" value="1" min="1"></div>','确认添加',async function(){await API('/admin/api/channels',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider_id:document.getElementById('ch-p').value,name:document.getElementById('ch-n').value,api_key:document.getElementById('ch-k').value,weight:parseInt(document.getElementById('ch-w').value)||1})});toast('渠道已添加');render()})}

function delCh(cid){if(confirm('确定删除此渠道？'))API('/admin/api/channels/'+cid,{method:'DELETE'}).then(function(){toast('已删除');render()})}

function editCh(cid){
API('/admin/api/channels').then(function(r){return r.json()}).then(function(data){
var c=data.channels.find(function(x){return x.id===cid});if(!c)return;
modal('编辑渠道 #'+cid,'<div class="form-g"><label>名称</label><input id="ech-n" value="'+(c.name||'')+'"></div><div class="form-g mt2"><label>API密钥（留空不修改）</label><input id="ech-k" type="password" placeholder="留空保持不变"></div><div class="form-row mt2"><div class="form-g"><label>权重</label><input id="ech-w" type="number" value="'+c.weight+'" min="1"></div><div class="form-g"><label>状态</label><select id="ech-e"><option value="1" '+(c.enabled?'selected':'')+'>启用</option><option value="0" '+(!c.enabled?'selected':'')+'>禁用</option></select></div></div>','保存',async function(){
var body={name:document.getElementById('ech-n').value,weight:parseInt(document.getElementById('ech-w').value)||1,enabled:document.getElementById('ech-e').value==='1'};
var key=document.getElementById('ech-k').value;if(key)body.api_key=key;
await API('/admin/api/channels/'+cid,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});toast('渠道已更新');render()})})}

async function renderTokens(o){
var r=await API('/admin/api/tokens'),d=await r.json(),tokens=d.tokens||[];
o.innerHTML='<div class="page-enter"><div class="fb mb2"><div class="section-title">令牌列表</div><button class="btn btn-p" onclick="addTk()">+ 创建令牌</button></div><div class="card"><table><thead><tr><th>ID</th><th>名称</th><th>邮箱</th><th>令牌</th><th>额度</th><th>已用</th><th>状态</th><th>操作</th></tr></thead><tbody>'+tokens.map(function(t){return '<tr><td>'+t.id+'</td><td>'+t.name+'</td><td>'+(t.email||'-')+'</td><td class="mono">'+t.token_prefix+'...</td><td>'+(t.quota<0?'-':'$'+t.quota)+'</td><td>$'+t.used_quota.toFixed(3)+'</td><td><span class="badge '+(t.enabled?'bg':'br')+'">'+(t.enabled?'启用':'禁用')+'</span></td><td><button class="btn btn-sm" onclick="addQ('+t.id+')">加额度</button><button class="btn btn-sm btn-d" onclick="rvTk('+t.id+')" '+(t.enabled?'':'disabled')+'>撤销</button></td></tr>'}).join('')||'<tr><td colspan="8" class="empty">暂无令牌</td></tr>'}</tbody></table></div></div>';
}

function addTk(){modal('创建令牌','<div class="form-g"><label>名称</label><input id="tk-n" placeholder="例如: 开发机"></div><div class="form-row mt2"><div class="form-g"><label>额度($) (-1=无限)</label><input id="tk-q" type="number" value="-1"></div><div class="form-g"><label>速率(RPM)</label><input id="tk-r" type="number" value="60"></div></div><div id="tk-res" style="display:none" class="mt2"><div class="section-title">令牌已生成（立即复制！）</div><div class="token-box mt1" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:monospace;font-size:12px;display:flex;align-items:center;gap:8px"><span id="tk-v"></span><button class="btn btn-sm" onclick="cp(document.getElementById(\'tk-v\').textContent)">复制</button></div></div>','创建',async function(){var r=await API('/admin/api/tokens',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('tk-n').value||'管理令牌',quota:parseFloat(document.getElementById('tk-q').value)||-1,rate_limit_rpm:parseInt(document.getElementById('tk-r').value)||60})});var d=await r.json();document.getElementById('tk-v').textContent=d.token.token;document.getElementById('tk-res').style.display='block';document.getElementById('okbtn').textContent='完成';return new Promise(function(resolve){document.getElementById('okbtn').onclick=function(){document.querySelector('.modal-overlay').remove();render();resolve()}})})}

function addQ(tid){modal('增加额度','<div class="form-g"><label>金额(USD)</label><input id="q-v" type="number" step="0.01" min="0.01" value="1"></div>','确认',async function(){await API('/admin/api/tokens/'+tid+'/quota',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount:parseFloat(document.getElementById('q-v').value)})});toast('额度已增加');render()})}
function rvTk(tid){if(confirm('确定撤销此令牌？'))API('/admin/api/tokens/'+tid,{method:'DELETE'}).then(function(){toast('已撤销');render()})}

async function renderModels(o){
var r=await API('/admin/api/models'),d=await r.json(),models=d.models||[];
o.innerHTML='<div class="page-enter"><div class="fb mb2"><div class="section-title">模型定价</div><button class="btn btn-p" onclick="addMd()">+ 添加模型</button></div><div class="card"><table><thead><tr><th>模型ID</th><th>名称</th><th>厂商</th><th>输入价</th><th>输出价</th><th>单位</th><th>操作</th></tr></thead><tbody>'+models.map(function(m){return '<tr><td class="mono">'+m.id+'</td><td>'+m.display_name+'</td><td>'+m.provider_name+'</td><td>$'+m.input_price+'</td><td>$'+m.output_price+'</td><td>'+m.unit_size+'</td><td><button class="btn btn-sm btn-d" onclick="delMd(\''+m.provider_id+'\',\''+m.id+'\')">删除</button></td></tr>'}).join('')||'<tr><td colspan="7" class="empty">暂无模型</td></tr>'}</tbody></table></div></div>';
}

async function addMd(){
var r=await API('/admin/api/providers'),d=await r.json();
var opts=d.providers.map(function(p){return '<option value="'+p.id+'">'+p.name+'</option>'}).join('');
modal('添加模型','<div class="form-g"><label>厂商</label><select id="md-p">'+opts+'</select></div><div class="form-row mt2"><div class="form-g" style="flex:2"><label>模型ID</label><input id="md-i" placeholder="gpt-4o"></div><div class="form-g" style="flex:2"><label>显示名称</label><input id="md-d" placeholder="GPT-4o"></div></div><div class="form-row mt2"><div class="form-g"><label>输入价格</label><input id="md-in" type="number" step="0.001" value="1"></div><div class="form-g"><label>输出价格</label><input id="md-out" type="number" step="0.001" value="1"></div><div class="form-g"><label>单位(tokens)</label><input id="md-u" type="number" value="1000"></div></div>','确认添加',async function(){await API('/admin/api/models',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model_id:document.getElementById('md-i').value,provider_id:document.getElementById('md-p').value,display_name:document.getElementById('md-d').value,input_price:parseFloat(document.getElementById('md-in').value),output_price:parseFloat(document.getElementById('md-out').value),unit_size:parseInt(document.getElementById('md-u').value)})});toast('模型已添加');render()})}
function delMd(pid,mid){if(confirm('确定删除此模型？'))API('/admin/api/models/'+pid+'/'+mid,{method:'DELETE'}).then(function(){toast('已删除');render()})}

async function renderLogs(o){
var r=await API('/admin/api/logs?limit=100'),d=await r.json(),logs=d.logs||[];
o.innerHTML='<div class="page-enter"><div class="section-title">最近使用记录</div><div class="card"><table><thead><tr><th>时间</th><th>用户</th><th>厂商</th><th>模型</th><th>输入</th><th>输出</th><th>费用</th><th>状态</th></tr></thead><tbody>'+logs.map(function(l){return '<tr><td class="mono">'+l.created_at+'</td><td>'+(l.user_name||'-')+'</td><td>'+l.provider+'</td><td>'+l.model+'</td><td>'+l.prompt_tokens+'</td><td>'+l.completion_tokens+'</td><td>$'+l.quota_used.toFixed(5)+'</td><td><span class="badge '+(l.status==='success'?'bg':'br')+'">'+(l.status==='success'?'成功':'失败')+'</span></td></tr>'}).join('')||'<tr><td colspan="8" class="empty">暂无使用记录</td></tr>'}</tbody></table></div></div>';
}

render();
</script>
</body>
</html>
